app = 'webhookx-ingestion'
primary_region = 'iad'

[build]
  dockerfile = 'docker/ingestion/Dockerfile'

# Secrets (set via `fly secrets set --app webhookx-ingestion`):
#   REDIS_URL=<redis connection string>

[env]
  PORT = '8080'
  SLOG_LEVEL = '0'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = '5s'
    interval = '15s'
    method = 'GET'
    timeout = '2s'
    path = '/healthz'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
