app = 'webhookx-frontend'
primary_region = 'iad'

[build]
  dockerfile = 'frontend/Dockerfile'

# Secrets (set via `fly secrets set --app webhookx-frontend`):
#   NEXT_PUBLIC_API_URL=<public URL of webhookx-data-api, e.g. https://webhookx-data-api.fly.dev>

[env]
  NODE_ENV = 'production'
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
