services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webhookx -d webhookx"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: docker/data-api/Dockerfile
    command: ["migrate"]
    volumes:
      - ./postgres/migrations:/postgres/migrations
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  ingestion:
    build:
      context: .
      dockerfile: docker/ingestion/Dockerfile
    ports:
      - "8080:8080"
    environment:
      REDIS_URL: ${REDIS_URL}
      PORT: "8080"
      SLOG_LEVEL: "0"
    depends_on:
      redis:
        condition: service_healthy

  data-api:
    build:
      context: .
      dockerfile: docker/data-api/Dockerfile
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      REDIS_URL: ${REDIS_URL}
      PORT: "8081"
      SLOG_LEVEL: "0"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  processor:
    build:
      context: .
      dockerfile: docker/processor/Dockerfile
    ports:
      - "8082:8082"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      REDIS_URL: ${REDIS_URL}
      PORT: "8082"
      SLOG_LEVEL: "0"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
